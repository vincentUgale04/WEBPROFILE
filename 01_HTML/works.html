<!DOCTYPE html>
<html lang="en" class="scroll-smooth">

    <title>BVUgale - WebProfile</title>

    <link href="../04_IMAGES/-BVUgale-.png" rel="icon">
    <link href="assets/img/apple-touch-icon.png" rel="apple-touch-icon">

    <!-- Styles Links -->
    <link rel="stylesheet" href="../02_CSS/styles.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet"

        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        clifford: '#da373d',

                        DFBlue: '#20368f',
                    },
                    zIndex: {
                        '9997': '9997',

                    inset: {

<!-- ===== Body ===== -->

<body class="bg-BGray">

    <!-- ======= Mobile nav toggle button ======= -->
    <i class="bi bi-list mobile-nav-toggle d-lg-none"></i>

    <!-- ======= Logo ======= -->
    <i class="display"><a href="index.html" class="logo self-center"><img src="../04_IMAGES/-BVUgale-.png" alt=""
                class="img-fluid"></a></i>

    <!-- ======= Header ======= -->
    <header id="header" class="d-flex flex-column justify-content-end">

        <!-- Nav Bar -->
        <nav id="navbar" class="navbar nav-menu">
            <ul>
                <li data-te-animation-init data-te-animation-start="onScroll" data-te-animation-on-scroll="repeat"
                    data-te-animation-show-on-load="false" data-te-animation="[fade-in_2s_ease-in-out]"><a
                        href="index.html" class="nav-link"><i class="fa-solid fa-house"></i>
                        <span>Home</span></a>
                </li>

                <li data-te-animation-init data-te-animation-start="onScroll" data-te-animation-on-scroll="repeat"
                    data-te-animation-show-on-load="false" data-te-animation="[fade-in_2s_ease-in-out]"><a
                        href="works.html" class="nav-link active"><i class="fa-regular fa-images fa-flip"
                            style="--fa-animation-duration: 3s;"></i>
                        <span>My
                            Works</span></a>
                </li>

                <li data-te-animation-init data-te-animation-start="onScroll" data-te-animation-on-scroll="repeat"
                    data-te-animation-show-on-load="false" data-te-animation="[fade-in_2s_ease-in-out]"><a
                        href="contact.html" class="nav-link"><i class="fa-regular fa-address-book"></i> <span>Contact
                            Details</span></a>
                </li>

            </ul>
        </nav>

    </header>

    <main>
        <!-- Title -->
        <section class="flex flex-col justify-center h-screen">
            <div data-te-animation-init data-te-animation-start="onScroll" data-te-animation-show-on-load="false"
                data-te-animation="[fade-in_2s_ease-in-out]"
                class="text-7xl text-DFBlue container flex flex-row justify-center">
                <h1>My Works</h1>
            </div>
        </section>

        <section class="bg-BGray text-DChar">
            <div class="home-more-stuff">

                <div class="more-stuff-grid">

                    <div class="from-left">
                        <a href="index.html" class="object-scale-down h-50 w-50"><img data-te-animation-init
                                data-te-animation-start="onScroll" data-te-animation-show-on-load="false"
                                data-te-animation="[fade-in_2s_ease-in-out]"
                                src="../04_IMAGES/Screenshot 2023-03-03 211319.png" alt="" />
                        </a>
                    </div>

                    <div>
                        <h3 class="text-DFBlue text-2xl font-bold mb-2">
                            My WebProfile</h3>

                        <p class="text-DFBlue">Kode Go Mini Project</p>
                        <p class="text-DFBlue">My Portfolio Website </p>

                    </div>
                </div>

        </section>

    </main>





    <!-- ======= Footer ======= -->
    <footer id="footer" class="bg-BGray text-DChar text-center pt-8 pb-8">
        <div class="container flex flex-col md:flex-row justify-around">

            <div data-te-animation-init data-te-animation-start="onScroll" data-te-animation-on-scroll="repeat"
                data-te-animation-show-on-load="false" data-te-animation="[fade-in_2s_ease-in-out]"
                class="flex flex-col">
                <div class="copyright">
                    2023 &copy; Copyright <strong><span class="text-DFBlue">WebProfile BVUgale</span></strong>. All
                    Rights Reserved
                </div>

                <div class="credits text-sm">
                    Designed & Developed by <a href="index.html" class="text-DFBlue hover:text-VBlue">Brian-Vincent
                        Ugale</a>
                </div>
            </div>

            <div class="ContactLinks flex flex-row justify-center p-3 text-DFBlue">
                <p data-te-animation-init data-te-animation-start="onScroll" data-te-animation-on-scroll="repeat"
                    data-te-animation-show-on-load="false" data-te-animation="[fade-in-right_1s_ease-in-out]"
                    onclick="copyFacebook()" class="pl-1 hover:text-VBlue"><i class="fa-brands fa-facebook fa-2xl"></i>
                </p>
                <p data-te-animation-init data-te-animation-start="onScroll" data-te-animation-on-scroll="repeat"
                    data-te-animation-show-on-load="false" data-te-animation="[fade-in-right_2s_ease-in-out]"
                    onclick="copyEmail()" class="pl-1 hover:text-VBlue"><i class="fa-solid fa-envelope fa-2xl"></i>
                </p>
            </div>

        </div>
    </footer>

    <!-- JS FILES -->
    <script type="text/javascript" src="../03_JS/main.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"

        crossorigin="anonymous"></script>
    <script src="https://kit.fontawesome.com/6c7763194c.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/tw-elements/dist/js/index.min.js"></script>

    <!-- Copy link effect -->
    <script>
        let email = 'brianvqugale@gmail.com';
        const copyEmail = async () => {
            try {
                await navigator.clipboard.writeText(email);
                console.log('Content copied to clipboard');
            } catch (err) {
                console.error('Failed to copy: ', err);
            }

            alert("copied to clipboard successfully");
        }

        let facebook = 'Brian-v Ugale'
        const copyFacebook = async () => {
            try {
                await navigator.clipboard.writeText(facebook);
            } catch (err) {
                console.error('Failed to copy: ', err);
            }
            alert("copied to clipboard successfully");
        }
    </script>





</body>

</html>
